services:
  backend:
    image: ${BACKEND_IMAGE:-stxplore-backend:latest}
    container_name: stxplore-backend
    build:
      context: .
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./deploy/.env.prod
    environment:
      CRIME_AGGREGATES_PATH: /app/data/derived/crime_daily.parquet
      PRED_MODELS_DIR: /app/models
      PRED_DATA_FALLBACK_CSV: /app/data/Chicago-Data/Crime/crime_1_day_pivot.csv
      PRED_DEVICE: ${PRED_DEVICE:-cpu}
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
